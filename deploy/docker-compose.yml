services:
  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: autochecker-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - AUTOCHECKER_DIR=/app/autochecker
      - DB_PATH=/app/data/bot.db
    volumes:
      - bot-data:/app/data
      - autochecker-results:/app/autochecker/results
    command: python3 main_bot.py

  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: autochecker-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/app/data/bot.db
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
    volumes:
      - bot-data:/app/data
    ports:
      - "127.0.0.1:8082:8000"
    command: uvicorn dashboard.app:app --host 0.0.0.0 --port 8000

volumes:
  bot-data:
  autochecker-results:
